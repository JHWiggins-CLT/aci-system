skills:
  - name: close-loop
    path: close-loop/SKILL.md
    description: >
      Use when the user returns from a floor visit and wants to close out an
      investigation — capture floor findings, decide what comes next
      (Kaizen, A3, close, re-open, escalate), and produce the corresponding
      artifacts with follow-up schedules. Triggers on phrases like "closing
      out the investigation," "back from the floor," "floor findings on X,"
      "we confirmed it was Y," "draft the A3 for Z," "open a Kaizen for W,"
      or any phrasing that indicates the user has been to the floor and is
      bringing findings back. Do NOT use for proactive scans (use
      `signal-detect`), for new investigations (use `investigate`), or for
      editing the architecture (use `maintain`).
    triggers:
      - 'closing out'
      - 'back from the floor'
      - 'floor findings'
      - 'we confirmed'
      - 'draft the A3'
      - 'open a Kaizen'
      - 'we ruled out'
    content_hash: efe786901d296cebf4e1000205a722531dc1d283d3baf85969fa8ecbc5568be7
  - name: export
    path: export/SKILL.md
    description: >
      Use when the user wants to turn an existing A3 or Kaizen into a
      polished, self-contained document to SHARE with someone OUTSIDE the
      system — management, a sponsor, a peer facility — typically phrased as
      "export this A3 to HTML," "render the Kaizen as a shareable report,"
      "make this presentable for management," "send the dal-02 A3 to my
      director," "give me an HTML version of the open A3s," or "put together
      the whole dal-02 story (investigation + what we did + outcomes) as one
      report for management." Produces consistently- structured HTML — every
      A3 the same, every Kaizen the same, and a combined investigation
      BUNDLE (investigation + A3s + Kaizens + outcome history) the same —
      written to `reports/`. Do NOT use to BROWSE or list work inside the
      system (use `review`), to draft or close artifacts (use `close-loop`),
      for the daily scan (use `signal-detect`), or to edit the architecture
      (use `maintain`).
    triggers:
      - 'export'
      - 'export to html'
      - 'render as html'
      - 'shareable report'
      - 'share with management'
      - 'send to my director'
      - 'presentable version'
      - 'html version of'
      - 'make this presentable'
      - 'the whole story as one report'
      - 'bundle the investigation'
    content_hash: cb53e8d141f42b1165dc5ff2aef0d6ddc489f3dfb746419b7dca84b50cf5742b
  - name: investigate
    path: investigate/SKILL.md
    description: >
      Use when the user wants to investigate a specific signal at a specific
      facility — typically picked from the output of `signal-detect` or
      arrived at independently. Runs a playbook end-to-end, executes
      diagnostic calcs, checks pattern history, drafts hypotheses, and
      produces a floor brief saved to `data/investigations/open/` with
      state=drafted. Do NOT use for proactive scans (use `signal-detect`),
      for closing out floor findings (use `close-loop`), or for editing the
      architecture (use `maintain`).
    triggers:
      - 'investigate'
      - 'look into'
      - 'dig into'
      - 'why is X dropping'
      - 'what is going on with'
      - 'draft a brief for'
    content_hash: dcc359de07735e26e3a7fb194955e0dcf8b0d363f93e7200bfa79b0f5d38c8cc
  - name: maintain
    path: maintain/SKILL.md
    description: >
      Use when the user wants to edit the architecture itself — add a
      facility, add or update a calc, add or update a playbook, add an event
      type, add or update a pattern, update facility aliases, bump the
      schema version, or deprecate a facility. **Partially proceduralized:**
      most operations now have authored, authoritative procedures in
      `maintain/procedures/` — `add_calc.md`, `add_pattern.md`,
      `update_pattern.md`, `add_facility.md`, `bump_schema.md`,
      `add_playbook.md` (plus templates in `maintain/templates/`); follow
      them step by step when they match. The remaining operations
      (`add_event_type`, `update_aliases`, `deprecate_facility`) are still
      hand-walked — confirm scope with the user, copy any relevant template,
      execute, and verify by hand (`bash verify.sh`, `bash
      calc/tests/run.sh`, `python .skills/.meta/reconcile.py` as
      applicable). Do NOT use for running investigations (use
      `investigate`), for proactive scans (use `signal-detect`), or for
      closing the loop on a floor visit (use `close-loop`).
    triggers:
      - 'add a facility'
      - 'add a calc'
      - 'new playbook'
      - 'update the pattern'
      - 'bump the schema'
      - 'add an event type'
      - 'deprecate'
      - 'update aliases'
    content_hash: ed191e102fd7068c00615919465124fa0b465ea57e90bc41724ba72629e7cb02
  - name: onboard
    path: onboard/SKILL.md
    description: >
      Use when the operator wants to set up or onboard the system against
      their own production data — first-time setup, or flipping a demo
      deployment to production. Walks the full setup flow: facilities,
      schema, the conversion adapter, thresholds, events backfill, resetting
      demo state, and the deployment-mode switch, then verifies. Do NOT use
      for normal CI work in an already-configured deployment (use
      `signal-detect`, `investigate`, or `close-loop`), and do NOT use for
      one-off incremental edits to an existing deployment's architecture
      (use `maintain`).
